<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=4.0, user-scalable=yes">
  <title>Draw Together - Real-Time Collaborative Drawing</title>
  <meta name="description" content="Draw Together is a free real-time collaborative drawing app. Create a room, share the code, and draw with friends live.">
  <meta name="author" content="Shashidhar Jadimath">
  <meta name="keywords" content="collaborative drawing, real-time drawing, online whiteboard, draw together, shared canvas">
  <meta name="google-site-verification" content="pM9eKz2j4Jv1GgDZMYVMLdnwlKSTWw0nNU7nBWzbDt0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="lobby">
      <h1>Draw Together</h1>
      <div id="name-controls">
        <input type="text" id="name-input" placeholder="Your name" maxlength="20">
      </div>
      <div id="room-controls">
        <input type="text" id="room-input" placeholder="Room code (or leave blank for new)" maxlength="10">
        <button id="join-btn">Join / Create Room</button>
      </div>
      <div id="color-picker-container">
        <label>Color: <input type="color" id="color-picker" value="#000000"></label>
        <label>Brush: <input type="range" id="brush-size" min="1" max="20" value="4"></label>
      </div>
    </div>

    <div id="canvas-container" style="display:none">
      <div id="toolbar">
        <span id="room-label">Room: <strong id="room-code"></strong></span>
        <div id="tools-group">
          <button class="tool-btn active" id="tool-brush" title="Brush">✏️</button>
          <button class="tool-btn" id="tool-eraser" title="Eraser">🧹</button>
          <button class="tool-btn" id="tool-fill" title="Fill">🪣</button>
        </div>
        <div id="toolbar-controls">
          <label class="toolbar-color"><input type="color" id="toolbar-color" value="#000000"></label>
          <div id="color-presets">
             <button class="color-preset" style="background:#000000" data-color="#000000"></button>
             <button class="color-preset" style="background:#ef4444" data-color="#ef4444"></button>
             <button class="color-preset" style="background:#22c55e" data-color="#22c55e"></button>
             <button class="color-preset" style="background:#3b82f6" data-color="#3b82f6"></button>
             <button class="color-preset" style="background:#eab308" data-color="#eab308"></button>
             <button class="color-preset" style="background:#a855f7" data-color="#a855f7"></button>
          </div>
          <label class="toolbar-size"><input type="range" id="toolbar-size" min="1" max="20" value="4"></label>
          <span id="size-label">4</span>
        </div>
        <button id="clear-btn">Clear</button>
        <button id="leave-btn">Leave</button>
      </div>
      <div id="canvas-wrapper">
        <canvas id="draw-canvas"></canvas>
        <canvas id="cursor-canvas"></canvas>
        <div id="stroke-tooltip"></div>
      </div>
      <div id="zoom-bar">
        <button id="zoom-out">−</button>
        <input type="range" id="zoom-slider" min="10" max="400" value="100">
        <span id="zoom-level">100%</span>
        <button id="zoom-in">+</button>
        <button id="zoom-reset">↺</button>
      </div>
      <div id="users-bar">
        <span>Online:</span>
        <div id="user-indicators"></div>
      </div>
    </div>
  </div>
  <div id="footer">Created by <strong>Shashidhar Jadimath</strong></div>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
