<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Draw Together</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="lobby">
      <h1>Draw Together</h1>
      <div id="name-controls">
        <input type="text" id="name-input" placeholder="Your name" maxlength="20">
      </div>
      <button id="join-btn">Create / Join Room</button>
      <div id="color-picker-container">
        <label>Color: <input type="color" id="color-picker" value="#000000"></label>
        <label>Brush: <input type="range" id="brush-size" min="1" max="20" value="4"></label>
      </div>
    </div>

    <div id="canvas-container" style="display:none">
      <div id="toolbar">
        <span id="room-label">Room: <strong id="room-code"></strong></span>
        <button id="clear-btn">Clear Canvas</button>
        <button id="leave-btn">Leave</button>
      </div>
      <div id="canvas-wrapper">
        <canvas id="draw-canvas"></canvas>
        <canvas id="cursor-canvas"></canvas>
        <div id="stroke-tooltip"></div>
      </div>
      <div id="users-bar">
        <span>Online:</span>
        <div id="user-indicators"></div>
      </div>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
